# ===============================
# Application
# ===============================
spring.application.name=RevPay
server.port=${PORT:8080}

# ===============================
# PostgreSQL Database (Render)
# ===============================
spring.datasource.url=jdbc:postgresql://dpg-d6p91bmuk2gs73cpq7s0-a:5432/revpay_db
spring.datasource.username=revpay_db_user
spring.datasource.password=srNOx2HI2iaPYD6bEQNUqKvxd1Cj3wYK
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# HikariCP
# ===============================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.connection-timeout=30000

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Thymeleaf
# ===============================
spring.thymeleaf.cache=false

# ===============================
# Security (Default Login)
# ===============================
spring.security.user.name=admin
spring.security.user.password=admin

# ===============================
# File Upload
# ===============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Render disk storage path
loan.upload.dir=/data/uploads/loans

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
