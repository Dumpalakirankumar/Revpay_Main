<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Notifications - RevPay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 font-['Inter']">
    <div class="flex h-screen">
        <main class="flex-1 p-8 overflow-y-auto">
            <div class="max-w-4xl mx-auto">
                <div class="flex items-center justify-between mb-8">
                    <h1 class="text-2xl font-bold">Notifications</h1>
                    <a href="/dashboard" class="text-indigo-600 hover:underline text-sm">Back to Dashboard</a>
                </div>

                <div th:if="${#lists.isEmpty(notifications)}" class="bg-white p-10 text-center rounded-xl shadow-sm border border-gray-100">
                    <p class="text-gray-400">No notifications yet.</p>
                </div>

                <div class="space-y-4">
                    <div th:each="n : ${notifications}" 
                         class="p-5 rounded-xl border transition shadow-sm"
                         th:classappend="${n.isRead ? 'bg-white border-gray-100 opacity-80' : 'bg-indigo-50 border-indigo-100'}">
                        <div class="flex justify-between">
                            <h3 class="font-bold text-gray-900" th:text="${n.title}">Title</h3>
                            <span class="text-xs text-gray-400" th:text="${#temporals.format(n.createdAt, 'dd MMM, HH:mm')}">Time</span>
                        </div>
                        <p class="text-sm text-gray-600 mt-1" th:text="${n.message}">Message body...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
